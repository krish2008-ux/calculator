<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Calculator - Krish</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
    background-size:400% 400%;
    animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
    0%{background-position:left;}
    100%{background-position:right;}
}

.calculator{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    transition:0.4s;
}

.calculator:hover{
    transform:scale(1.07) rotate(1deg);
}

.owner{
    text-align:center;
    font-size:20px;
    color:white;
    margin-bottom:10px;
    letter-spacing:2px;
}

#display{
    width:100%;
    height:60px;
    border:none;
    border-radius:10px;
    font-size:24px;
    text-align:right;
    padding-right:10px;
    margin-bottom:15px;
    background:rgba(0,0,0,0.3);
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg,#ff6ec4,#7873f5);
    transition:0.3s;
}

button:hover{
    transform:scale(1.15);
    box-shadow:0 0 15px #fff;
}

.operator{
    background:linear-gradient(45deg,#f7971e,#ffd200);
}

.equal{
    background:linear-gradient(45deg,#00dbde,#fc00ff);
}

.clear{
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
}

footer{
    text-align:center;
    margin-top:10px;
    color:white;
    font-size:14px;
}

</style>
</head>

<body>

<div class="calculator">

<div class="owner">🌸 Anime Calculator - Krish 🌸</div>

<input type="text" id="display" disabled>

<div class="buttons">

<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="append('%')">%</button>
<button onclick="append('/')">÷</button>
<button onclick="append('*')" class="operator">×</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('-')" class="operator">−</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('+')" class="operator">+</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="calculate()" class="equal">=</button>

<button onclick="append('0')" style="grid-column:span 2;">0</button>
<button onclick="append('.')">.</button>

</div>

<footer>Made with ❤️ by Krish</footer>

</div>

<script>

function append(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function calculate(){
try{
document.getElementById("display").value=
eval(document.getElementById("display").value);
}
catch{
alert("Invalid calculation");
}
}

</script>

</body>
</html>
